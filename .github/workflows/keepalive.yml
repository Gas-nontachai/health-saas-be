name: Keep Render Services Awake

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping configured health URLs
        env:
          KEEPALIVE_URLS: ${{ vars.KEEPALIVE_URLS }}
        run: |
          if [ -z "$KEEPALIVE_URLS" ]; then
            echo "KEEPALIVE_URLS is not configured. Skipping."
            exit 0
          fi

          echo "$KEEPALIVE_URLS" | tr ',' '\n' | while read -r url; do
            url="$(echo "$url" | xargs)"
            if [ -z "$url" ]; then
              continue
            fi

            echo "Pinging $url"
            curl --fail --silent --show-error --max-time 30 "$url" > /dev/null
          done
